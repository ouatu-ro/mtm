site_name: MTM
site_description: Meta Turing Machine documentation
repo_url: https://github.com/ouatu-ro/mtm
repo_name: ouatu-ro/mtm

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight

extra_css:
  - assets/stylesheets/mtm.css

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - User Guide:
      - CLI: user-guide/cli.md
      - Debugger: user-guide/debugger.md
  - Specs:
      - Index: specs/spec.md
      - Overview: specs/overview.md
      - Object Model: specs/object-model.md
      - ABI and Artifacts: specs/abi-and-artifacts.md
      - Meta-ASM and Lowering: specs/meta-asm-and-lowering.md
      - Recursive Towers: specs/recursive-towers.md
      - Invariants and Correctness: specs/invariants-and-correctness.md
  - Architecture:
      - Debugger Stepper: architecture/debugger-stepper.md
  - Tools:
      - Index: tools/index.md
      - Trace Viewer: tools/trace-viewer.md
      - C Runners: tools/c-runners.md
  - Reference:
      - Concepts: reference/concepts.md
  - Advanced:
      - L2 Bootstrap Results: results/l2-bootstrap.md
      - L2 Incrementer Runbook: runbooks/l2-incrementer.md
